<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='logo.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='landing.css')}}">
    
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
        }

        /* Navbar */
        .navbar {
            padding: 15px 30px;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 22px;
        }

        .btn-outline-light:hover {
            background-color: white;
            color: black;
        }

        .btn-primary {
            background-color: white;
            color: black;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ccc;
            color: black;
        }

        /* Hero Section */
        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px;
        }

        .hero-text h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .hero-text p {
            color: #aaa;
            margin: 20px 0;
        }

        .hero-buttons .btn {
            margin-right: 10px;
        }

        /* Logo Box */
        .logo-box {
            width: 300px;
            height: 300px;
            background: #1a1a1a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('landing') }}">ToDo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- Left side -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('about', next='landing') }}">About</a>
                </li>
               
            </ul>

            <!-- Right side buttons -->
            <div class="d-flex gap-2">
                <a href="/login" class="btn btn-outline-light">Login</a>
                <a href="/signup" class="btn btn-primary">Sign Up</a>
            </div>

        </div>
    </div>
</nav>
<section class="hero">

    <!-- LEFT -->
    <div class="hero-text">
        <h1>Stay Organized.<br>Stay Focused.</h1>

        <p>
            A simple and powerful way to manage your daily tasks.
            Built for speed, clarity, and productivity.
        </p>

        <div class="hero-buttons">
            <a href="/signup" class="btn btn-primary">Get Started</a>
            <a href="/login" class="btn btn-outline-light">Login</a>
        </div>
    </div>
    <div class="right">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="PH Tasks Logo" class="hero-logo" >
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
