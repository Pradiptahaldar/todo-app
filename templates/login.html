<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - PH Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='login.css')}}">

    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            padding: 15px 30px;
        }

        /* Center container */
        .login-container {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 0 25px rgba(255,255,255,0.05);
        }

        .login-box h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0d0d0d;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        input:focus {
            outline: none;
            border-color: white;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: white;
            color: black;
            border: none;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #ccc;
        }

        /* Footer text */
        .bottom-text {
            text-align: center;
            margin-top: 15px;
            color: #aaa;
        }

        .bottom-text a {
            color: white;
            text-decoration: none;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>


<nav class="navbar navbar-expand-lg navbar-dark bg-black">
    <div class="container-fluid">

        <a class="navbar-brand" href="{{ url_for('signup') }}">ToDo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('about', next='login') }}">About</a>
                </li>
                 <li class ="nav-item">
                    <a class="nav-link" href="{{ url_for('landing') }}">home</a>
                    </li>
            </ul>

            <!-- Right side buttons -->
            <div class="d-flex gap-2">
                <a href="/login" class="btn btn-outline-light">Login</a>
            </div>

        </div>
    </div>
</nav>
<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<div class="login-container">
    <div class="login-box">
        <form action="/login" method="POST" class="form-box">
            <h2>Login</h2>

        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit" class="btn btn-primary">Login</button>
        {% if error %}
        <p style="color:red; margin-top: 10px;"> 
            {{error}}
        </p>
        {% endif %}

        <div class="bottom-text">
            Don't have an account? <a href="/signup">Sign up</a>
        </div>
    </form>
</div>
</body>
</html>
